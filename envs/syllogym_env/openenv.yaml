spec_version: 1
name: syllogym_env
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: >
  SylloGym: Multi-turn Judge Agent legal reasoning environment.
  The agent plays a judge who discovers case facts progressively turn by turn,
  including plot twists that may reverse the previous conclusion.
  12 procedural generators across US law domains — diversity jurisdiction, UCC,
  Miranda rights, consideration, mens rea, Terry stop, SARA § 7703, telemarketing
  sales rule, qualifying child/relative, Statute of Frauds, hearsay (FRE 801-807),
  and adverse possession (OCEAN test).
  All ground truth is computed by deterministic Python verifiers.
  Action: {"answer": "Yes" | "No"}
tasks:
